<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Mis Mascotas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard-layout">

        <!-- Mobile Header -->
        <div class="mobile-header shadow-sm">
            <div class="d-flex align-items-center">
                <img src="images/logo.png" alt="VetCare Logo" height="30" class="me-2">
                <span class="fs-5 fw-bold text-primary-custom">VetCare</span>
            </div>
            <button class="hamburger-btn" id="hamburgerBtn">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar shadow-sm" id="sidebar">
            <div class="sidebar-header d-flex align-items-center">
                <img src="images/logo.png" alt="VetCare Logo" height="40" class="me-2">
                <span class="fs-4 fw-bold text-primary-custom">VetCare</span>
            </div>

            <div class="sidebar-menu">
                <a href="owner_dashboard.html" class="sidebar-link">
                    <i class="bi bi-house-door-fill"></i> Resumen
                </a>
                <a href="owner_pets.html" class="sidebar-link active">
                    <i class="bi bi-suit-heart-fill"></i> Mis Mascotas
                </a>
                <a href="owner_appointments.html" class="sidebar-link">
                    <i class="bi bi-calendar-check"></i> Mis Citas
                </a>
                <a href="owner_shop.html" class="sidebar-link">
                    <i class="bi bi-shop"></i> Tienda y Servicios
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="dropdown">
                    <a class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark" href="#"
                        role="button" id="ownerDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div
                            class="avatar-img me-2 bg-primary-custom text-white d-flex align-items-center justify-content-center fw-bold">
                            NA</div>
                        <div>
                            <span class="fw-medium d-block" style="line-height: 1;">Nelly Aguiar</span>
                            <small class="text-muted">Dueña de Mascota</small>
                        </div>
                    </a>
                    <ul class="dropdown-menu shadow border-0 w-100" aria-labelledby="ownerDropdown">
                        <li><a class="dropdown-item text-danger" href="index.html"><i
                                    class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content fade-in">

            <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
                <div>
                    <h2 class="text-accent-color m-0">Mis Mascotas Registradas</h2>
                </div>
                <div>
                    <!-- El botón de agregar mascota fue removido, solo el veterinario puede registrar nuevas mascotas -->
                </div>
            </header>

            <div class="row">
                <!-- Max Card -->
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card card-custom h-100 overflow-hidden">
                        <div class="bg-secondary-custom p-4 text-center position-relative">
                            <img src="images/Maya_.png" alt="Maya" class="pet-avatar shadow-sm bg-white"
                                style="width: 120px; height: 120px; border-width: 4px;">
                            <span
                                class="position-absolute top-0 end-0 m-3 badge bg-success rounded-pill px-3 py-2">Saludable</span>
                        </div>
                        <div class="card-body p-4 text-center">
                            <h3 class="card-title text-accent-color fw-bold">Maya</h3>
                            <p class="text-muted mb-4">Carey</p>

                            <div class="row text-start border-top pt-3">
                                <div class="col-6 mb-3">
                                    <small class="text-muted d-block">Peso</small>
                                    <span class="fw-medium"><i class="bi bi-speedometer2 text-primary-custom me-1"></i>
                                        2.5 kg</span>
                                </div>
                                <div class="col-6 mb-3">
                                    <small class="text-muted d-block">Edad</small>
                                    <span class="fw-medium"><i class="bi bi-calendar3 text-primary-custom me-1"></i> 2
                                        años</span>
                                </div>
                                <div class="col-12">
                                    <small class="text-muted d-block">Microchip</small>
                                    <span class="fw-medium"><i class="bi bi-upc-scan text-secondary me-1"></i>
                                        #982103810</span>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                                <button class="btn btn-outline-primary btn-sm flex-grow-1 me-2">Editar Info</button>
                                <button class="btn btn-primary-custom btn-sm flex-grow-1">Cartilla</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
